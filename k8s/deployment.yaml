apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatsupport-team
  labels:
    app: chatsupport-team
spec:
  replicas: 2
  selector:
    matchLabels:
      app: chatsupport-team
  template:
    metadata:
      labels:
        app: chatsupport-team
    spec:
      containers:
      - name: chatsupport-team
        image: <IMAGE>
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: chatsupport-team
spec:
  selector:
    app: chatsupport-team
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: chatsupport-team
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
  - host: dev-nexus.dhaamai.com
    http:
      paths:
      - path: /cs-team(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: chatsupport-team
            port:
              number: 80
